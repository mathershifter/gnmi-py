name: Test and build with uv

on:
  pull_request:
    paths-ignore: ['docs/**', 'README.md', "examples/**", "scripts/**"]
  push:
    branches: [main]
    paths-ignore: ['docs/**', 'README.md', "examples/**", "scripts/**"]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true
          prune-cache: false
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group test --all-extras
      - run: uv run --locked --group test ruff check
      - run: uv run --locked --group test pytest tests/

